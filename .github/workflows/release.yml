name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        run: |
          cd SSHTunnelManager
          xcodebuild -scheme SSHTunnelManager \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign
        run: |
          APP=SSHTunnelManager/build/Build/Products/Release/SSHTunnelManager.app
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose "$APP"

      - name: Create DMG
        run: |
          python3 -m venv .dmgvenv
          .dmgvenv/bin/pip install --quiet dmgbuild==1.6.7
          DMG_APP="SSHTunnelManager/build/Build/Products/Release/SSHTunnelManager.app" \
          DMG_BACKGROUND="$PWD/packaging/dmg-background.tiff" \
            .dmgvenv/bin/dmgbuild -s packaging/dmg_settings.py "SSH Tunnel Manager" SSHTunnelManager.dmg

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: SSHTunnelManager.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
