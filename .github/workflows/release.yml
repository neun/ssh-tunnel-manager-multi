name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        run: |
          cd SSHTunnelManager
          xcodebuild -scheme SSHTunnelManager \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign
        run: |
          APP=SSHTunnelManager/build/Build/Products/Release/SSHTunnelManager.app
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose "$APP"

      - name: Create DMG
        run: |
          mkdir -p dist
          cp -R SSHTunnelManager/build/Build/Products/Release/SSHTunnelManager.app dist/
          hdiutil create -volname "SSH Tunnel Manager" \
            -srcfolder dist \
            -ov -format UDZO \
            SSHTunnelManager.dmg

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: SSHTunnelManager.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
