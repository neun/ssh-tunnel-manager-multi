<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F2F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1FC7A8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#1FC7A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- soft brand glow behind the app icon (left) -->
  <circle cx="150" cy="185" r="160" fill="url(#glow)"/>

  <!-- drop-zone outline around the Applications folder (right) -->
  <rect x="378" y="113" width="144" height="144" rx="28"
        fill="#000000" fill-opacity="0.015"
        stroke="#9AA0AE" stroke-opacity="0.75" stroke-width="2" stroke-dasharray="7 7"/>

  <!-- arrow: drag from app to Applications -->
  <g stroke="#0C8A72" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="248" y1="185" x2="352" y2="185"/>
    <polyline points="330,166 357,185 330,204"/>
  </g>

  <!-- caption -->
  <text x="300" y="323" text-anchor="middle"
        font-family="-apple-system, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#5A6072">Drag SSH Tunnel Manager to Applications</text>
</svg>
